apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: ghcr.io/your-org/your-app:latest  # promoted manually or via pipeline
          ports:
            - containerPort: 8080
          env:
            - name: ENV
              value: test
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: test
spec:
  selector:
    app: app
  ports:
    - port: 80
      targetPort: 8080
