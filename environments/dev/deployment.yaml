apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: ghcr.io/movepirot/app:c8b5652
          ports:
            - containerPort: 8080
          env:
            - name: ENV
              value: dev
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: dev
spec:
  selector:
    app: app
  ports:
    - port: 80
      targetPort: 8080
